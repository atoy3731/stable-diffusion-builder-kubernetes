comfy:
  resources:
    limits:
      nvidia.com/gpu: "1"
    requests:
      nvidia.com/gpu: "1"

automatic1111:
  resources:
    limits:
      nvidia.com/gpu: "1"
    requests:
      nvidia.com/gpu: "1"

useCpu: false

models:
  capacity: 100Gi
  links: |
    https://huggingface.co/nicky007/stable-diffusion-logo-fine-tuned/resolve/main/train.ckpt
      out=Stable-diffusion/diffusion-logo-fine-tuned.ckpt
    https://huggingface.co/stabilityai/sd-vae-ft-mse-original/resolve/main/vae-ft-mse-840000-ema-pruned.ckpt
      out=VAE/vae-ft-mse-840000-ema-pruned.ckpt
    https://huggingface.co/runwayml/stable-diffusion-inpainting/resolve/main/sd-v1-5-inpainting.ckpt
      out=Stable-diffusion/sd-v1-5-inpainting.ckpt
    https://github.com/TencentARC/GFPGAN/releases/download/v1.3.4/GFPGANv1.4.pth
      out=GFPGAN/GFPGANv1.4.pth
    https://huggingface.co/Comfy-Org/flux2-dev/resolve/main/split_files/diffusion_models/flux2_dev_fp8mixed.safetensors
      out=diffusion_models/flux2_dev_fp8mixed.safetensors
    https://huggingface.co/Comfy-Org/flux2-dev/resolve/main/split_files/text_encoders/mistral_3_small_flux2_fp8.safetensors
      out=text_encoders/mistral_3_small_flux2_fp8.safetensors
    https://huggingface.co/Comfy-Org/flux2-dev/resolve/main/split_files/vae/flux2-vae.safetensors
